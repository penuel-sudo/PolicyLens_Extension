<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolicyLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Roboto:wght@400;500;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1E0F0A;
      --ink-2:      #3B1F15;
      --brown:      #5C3D2E;
      --brown-mid:  #7A5244;
      --brown-pale: #C4A882;
      --cream:      #FBF7F3;
      --cream-d:    #F2EAE0;
      --cream-dd:   #E8DDD2;
      --stone:      #B09A90;
      --stone-lt:   #D0BEB6;

      --green:      #3D6B4F;
      --green-pale: #EAF3EE;
      --green-glow: rgba(61,107,79,.18);

      --s-high:   #C0392B;
      --s-high-bg:#FDF1F0;
      --s-high-bd:#EDCDC9;

      --s-med:    #A05C00;
      --s-med-bg: #FDF5EC;
      --s-med-bd: #EDD9B8;

      --s-low:    var(--green);
      --s-low-bg: var(--green-pale);
      --s-low-bd: #B8D9C7;

      --border:   rgba(92,61,46,.10);
      --shadow:   0 20px 48px rgba(30,15,10,.14), 0 4px 12px rgba(30,15,10,.08);
    }

    html, body { background: var(--cream-d); width: 340px; }

    body { font-family: 'DM Sans', sans-serif; color: var(--ink); }

    .shell {
      width: 340px;
      background: var(--cream);
      box-shadow: var(--shadow);
      animation: rise .28s cubic-bezier(.34,1.3,.64,1) both;
      overflow: hidden;
      position: relative;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(-8px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .hd {
      padding: 14px 16px 13px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    .hd-brand { display: flex; align-items: center; gap: 9px; }

    .hd-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--brown); color: var(--cream);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(92,61,46,.28);
    }

    .hd-icon svg { display: block; }

    .hd-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700;
      color: var(--brown); letter-spacing: -.01em;
    }

    .hd-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px 5px 10px; border-radius: 100px;
      border: 1.5px solid; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .02em;
      background: none; transition: all .2s; user-select: none;
    }

    .hd-pill.on  { border-color: var(--green); color: var(--green); background: var(--green-pale); }
    .hd-pill.off { border-color: var(--stone-lt); color: var(--stone); background: rgba(208,190,182,.15); }

    .hd-led {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: all .2s;
    }

    .hd-pill.on  .hd-led { background: var(--green); box-shadow: 0 0 5px var(--green-glow); }
    .hd-pill.off .hd-led { background: var(--stone-lt); }

    .stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      padding: 14px 10px 12px; text-align: center;
      border-right: 1px solid var(--border);
    }

    .stat:last-child { border-right: none; }

    .stat-n {
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 22px; font-weight: 700; line-height: 1;
      color: var(--ink); letter-spacing: -.01em;
      margin-bottom: 4px;
    }

    .stat-n em { font-style: normal; color: var(--brown); }

    .stat-l {
      font-size: 9px; font-weight: 700; color: var(--stone);
      letter-spacing: .08em; text-transform: uppercase;
    }

    .lbl {
      padding: 14px 16px 8px;
      font-size: 9px; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; color: var(--stone);
      display: flex; align-items: center; gap: 10px;
    }

    .lbl::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .current { padding: 0 16px 14px; }

    .current-row { display: flex; align-items: center; gap: 12px; }

    .fav {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: var(--cream-dd);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 400;
      color: var(--brown-mid);
    }

    .site-meta { flex: 1; min-width: 0; }

    .site-domain {
      font-family: 'DM Mono', monospace; font-size: 12.5px;
      color: var(--ink); margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .bar-track {
      height: 3px; border-radius: 100px; background: var(--cream-dd); overflow: hidden;
    }

    .bar-fill { height: 100%; border-radius: 100px; transition: width .8s cubic-bezier(.4,0,.2,1); }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px; flex-shrink: 0;
      font-size: 10px; font-weight: 800; letter-spacing: .04em;
      border: 1px solid;
    }

    .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .b-h { background: var(--s-high-bg); border-color: var(--s-high-bd); color: var(--s-high); }
    .b-m { background: var(--s-med-bg);  border-color: var(--s-med-bd);  color: var(--s-med); }
    .b-l { background: var(--s-low-bg);  border-color: var(--s-low-bd);  color: var(--s-low); }

    .bd-h { background: var(--s-high); }
    .bd-m { background: var(--s-med); }
    .bd-l { background: var(--s-low); }

    .fill-h { background: linear-gradient(90deg, var(--s-high-bd), var(--s-high)); }
    .fill-m { background: linear-gradient(90deg, var(--s-med-bd),  var(--s-med)); }
    .fill-l { background: linear-gradient(90deg, var(--s-low-bd),  var(--s-low)); }

    .recent {
      padding: 0 12px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }

    .r-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: var(--cream);
      border: 1.5px solid var(--cream-dd);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color .16s, box-shadow .16s, background .16s;
      box-shadow: 0 1px 3px rgba(92,61,46,.05);
    }

    .r-item:hover {
      border-color: var(--brown-pale);
      background: var(--cream);
      box-shadow: 0 3px 10px rgba(92,61,46,.09);
    }

    .r-fav {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      background: var(--cream-dd); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--brown-mid);
    }

    .r-name {
      flex: 1; font-family: 'DM Mono', monospace;
      font-size: 11.5px; color: var(--ink-2);
    }

    .mbadge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2.5px 8px; border-radius: 100px;
      font-size: 9px; font-weight: 800; letter-spacing: .04em; border: 1px solid;
    }

    .ft {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--cream-d);
      display: flex; align-items: center; justify-content: center;
    }

    .ft-cta {
      width: 100%; padding: 11px 0;
      background: var(--brown); color: var(--cream);
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: .01em;
      box-shadow: 0 3px 12px rgba(92,61,46,.22), 0 1px 0 rgba(255,255,255,.08) inset;
      transition: background .18s, transform .15s, box-shadow .18s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }

    .ft-cta:hover { background: var(--brown-mid); transform: translateY(-1px); box-shadow: 0 5px 18px rgba(92,61,46,.28); }
    .ft-cta:active { transform: translateY(0); }

    .overlay {
      position: absolute; inset: 0; top: 56px;
      background: rgba(251,247,243,.94);
      backdrop-filter: blur(6px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      z-index: 10; animation: fadeIn .2s ease both;
    }

    .overlay.hidden { display: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .ov-icon { font-size: 28px; opacity: .25; margin-bottom: 2px; }

    .ov-text { font-size: 13px; color: var(--stone); font-weight: 500; }

    .ov-btn {
      margin-top: 4px;
      padding: 9px 22px; border-radius: 9px;
      background: var(--brown); color: var(--cream);
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
      box-shadow: 0 3px 10px rgba(92,61,46,.24); transition: background .15s;
    }

    .ov-btn:hover { background: var(--brown-mid); }

    .stats   { animation: rise .32s .04s cubic-bezier(.34,1.2,.64,1) both; }
    .current { animation: rise .32s .08s cubic-bezier(.34,1.2,.64,1) both; }
    .recent  { animation: rise .32s .12s cubic-bezier(.34,1.2,.64,1) both; }
    .ft      { animation: rise .32s .16s cubic-bezier(.34,1.2,.64,1) both; }
  </style>
</head>
<body>

<div class="shell">

  <div class="overlay hidden" id="pausedOverlay">
    <div class="ov-icon">||</div>
    <div class="ov-text">PolicyLens is paused</div>
    <button class="ov-btn" id="turnOnBtn">Turn back on</button>
  </div>

  <div class="hd">
    <div class="hd-brand">
      <div class="hd-icon">
        <svg width="14" height="15" viewBox="0 0 14 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 1L1.5 3.5V7.5C1.5 10.5 4 13 7 14C10 13 12.5 10.5 12.5 7.5V3.5L7 1Z"
                fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.9)" stroke-width="1.2"
                stroke-linejoin="round"/>
          <path d="M4.5 7.5L6.2 9.2L9.5 6" stroke="white" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="hd-name">PolicyLens</span>
    </div>
    <button class="hd-pill on" id="toggleBtn">
      <div class="hd-led"></div>
      <span id="toggleLabel">Active</span>
    </button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-n">47</div>
      <div class="stat-l">Scanned</div>
    </div>
    <div class="stat">
      <div class="stat-n">12</div>
      <div class="stat-l">High Risk</div>
    </div>
    <div class="stat">
      <div class="stat-n"><em>98%</em></div>
      <div class="stat-l">Coverage</div>
    </div>
  </div>

  <div class="lbl">Current Site</div>
  <div class="current">
    <div class="current-row">
      <div class="fav">am</div>
      <div class="site-meta">
        <div class="site-domain">amazon.com</div>
        <div class="bar-track">
          <div class="bar-fill fill-l" style="width:22%;"></div>
        </div>
      </div>
      <div class="badge b-l">
        <div class="badge-dot bd-l"></div>
        Low Risk
      </div>
    </div>
  </div>

  <div class="lbl" style="padding-top:6px;">Recently Analysed</div>
  <div class="recent">
    <div class="r-item">
      <div class="r-fav">tw</div>
      <span class="r-name">twitter.com</span>
      <div class="mbadge b-m">
        <div class="badge-dot bd-m"></div>
        Medium
      </div>
    </div>

    <div class="r-item">
      <div class="r-fav">no</div>
      <span class="r-name">notion.so</span>
      <div class="mbadge b-m">
        <div class="badge-dot bd-m"></div>
        Medium
      </div>
    </div>

    <div class="r-item">
      <div class="r-fav">li</div>
      <span class="r-name">linear.app</span>
      <div class="mbadge b-l">
        <div class="badge-dot bd-l"></div>
        Low
      </div>
    </div>
  </div>

  <div class="ft">
    <button class="ft-cta" id="dashLink">
      Open Dashboard
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2.5 6H9.5M6.5 3L9.5 6L6.5 9" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>

<script src="popup.js"></script>

</body>
</html>
