<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolicyLens Floating Popup</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 340px;
      overflow: hidden;
      background: transparent;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    #root {
      width: 340px;
      overflow: hidden;
    }
  </style>
  <script src="floating-popup.js" defer></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
